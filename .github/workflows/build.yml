name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-22.04
            cmake_flags: ""
          - name: macOS Universal
            os: macos-15
            cmake_flags: '-DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"'
          - name: Windows
            os: windows-2022
            cmake_flags: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev \
            libxinerama-dev \
            libxext-dev \
            libfreetype6-dev \
            libwebkit2gtk-4.0-dev \
            libglu1-mesa-dev \
            xvfb

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE ../JUCE

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: ErinSynth-VST3-${{ matrix.name }}
          path: build/ErinSynth_artefacts/Release/VST3/
